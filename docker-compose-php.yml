services:
  # Servicio PHP-FPM
  php_api:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: php_api_83
    restart: unless-stopped
    volumes:
      - ./app-php:/var/www/html
    networks:
      - api_network

  # Servicio Nginx
  web_server:
    image: nginx:alpine
    container_name: nginx_api
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./app-php:/var/www/html
      - ./docker/php/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php_api
    networks:
      - api_network

networks:
  api_network:
    driver: bridge
